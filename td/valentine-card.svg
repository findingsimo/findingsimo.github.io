<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="1500" height="2100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="500" height="700" fill="#FFF0EB" />

  <!-- Pixel border (outer) -->
  <rect x="12" y="12" width="476" height="676" fill="none" stroke="#7B2D4A" stroke-width="6" />
  <!-- Pixel border (inner accent) -->
  <rect x="22" y="22" width="456" height="656" fill="none" stroke="#E8536D" stroke-width="2" />

  <!-- Pixel heart at top (10x8 grid, 10px blocks, symmetric) -->
  <g transform="translate(200, 50)">
    <!-- Row 0: ..XX..XX.. -->
    <rect x="20" y="0" width="10" height="10" fill="#E8536D"/>
    <rect x="30" y="0" width="10" height="10" fill="#E8536D"/>
    <rect x="60" y="0" width="10" height="10" fill="#E8536D"/>
    <rect x="70" y="0" width="10" height="10" fill="#E8536D"/>
    <!-- Row 1: .XXXXXXXX. -->
    <rect x="10" y="10" width="10" height="10" fill="#E8536D"/>
    <rect x="20" y="10" width="10" height="10" fill="#F4845F"/>
    <rect x="30" y="10" width="10" height="10" fill="#E8536D"/>
    <rect x="40" y="10" width="10" height="10" fill="#E8536D"/>
    <rect x="50" y="10" width="10" height="10" fill="#E8536D"/>
    <rect x="60" y="10" width="10" height="10" fill="#E8536D"/>
    <rect x="70" y="10" width="10" height="10" fill="#E8536D"/>
    <rect x="80" y="10" width="10" height="10" fill="#E8536D"/>
    <!-- Row 2: XXXXXXXXXX -->
    <rect x="0"  y="20" width="10" height="10" fill="#E8536D"/>
    <rect x="10" y="20" width="10" height="10" fill="#F4845F"/>
    <rect x="20" y="20" width="10" height="10" fill="#E8536D"/>
    <rect x="30" y="20" width="10" height="10" fill="#E8536D"/>
    <rect x="40" y="20" width="10" height="10" fill="#E8536D"/>
    <rect x="50" y="20" width="10" height="10" fill="#E8536D"/>
    <rect x="60" y="20" width="10" height="10" fill="#E8536D"/>
    <rect x="70" y="20" width="10" height="10" fill="#E8536D"/>
    <rect x="80" y="20" width="10" height="10" fill="#E8536D"/>
    <rect x="90" y="20" width="10" height="10" fill="#E8536D"/>
    <!-- Row 3: XXXXXXXXXX -->
    <rect x="0"  y="30" width="10" height="10" fill="#E8536D"/>
    <rect x="10" y="30" width="10" height="10" fill="#E8536D"/>
    <rect x="20" y="30" width="10" height="10" fill="#E8536D"/>
    <rect x="30" y="30" width="10" height="10" fill="#E8536D"/>
    <rect x="40" y="30" width="10" height="10" fill="#E8536D"/>
    <rect x="50" y="30" width="10" height="10" fill="#E8536D"/>
    <rect x="60" y="30" width="10" height="10" fill="#E8536D"/>
    <rect x="70" y="30" width="10" height="10" fill="#E8536D"/>
    <rect x="80" y="30" width="10" height="10" fill="#E8536D"/>
    <rect x="90" y="30" width="10" height="10" fill="#E8536D"/>
    <!-- Row 4: .XXXXXXXX. -->
    <rect x="10" y="40" width="10" height="10" fill="#E8536D"/>
    <rect x="20" y="40" width="10" height="10" fill="#E8536D"/>
    <rect x="30" y="40" width="10" height="10" fill="#E8536D"/>
    <rect x="40" y="40" width="10" height="10" fill="#E8536D"/>
    <rect x="50" y="40" width="10" height="10" fill="#E8536D"/>
    <rect x="60" y="40" width="10" height="10" fill="#E8536D"/>
    <rect x="70" y="40" width="10" height="10" fill="#E8536D"/>
    <rect x="80" y="40" width="10" height="10" fill="#E8536D"/>
    <!-- Row 5: ..XXXXXX.. -->
    <rect x="20" y="50" width="10" height="10" fill="#E8536D"/>
    <rect x="30" y="50" width="10" height="10" fill="#E8536D"/>
    <rect x="40" y="50" width="10" height="10" fill="#E8536D"/>
    <rect x="50" y="50" width="10" height="10" fill="#E8536D"/>
    <rect x="60" y="50" width="10" height="10" fill="#E8536D"/>
    <rect x="70" y="50" width="10" height="10" fill="#E8536D"/>
    <!-- Row 6: ...XXXX... -->
    <rect x="30" y="60" width="10" height="10" fill="#E8536D"/>
    <rect x="40" y="60" width="10" height="10" fill="#E8536D"/>
    <rect x="50" y="60" width="10" height="10" fill="#E8536D"/>
    <rect x="60" y="60" width="10" height="10" fill="#E8536D"/>
    <!-- Row 7: ....XX.... -->
    <rect x="40" y="70" width="10" height="10" fill="#E8536D"/>
    <rect x="50" y="70" width="10" height="10" fill="#E8536D"/>
