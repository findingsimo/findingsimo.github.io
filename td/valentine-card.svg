    <rect x="415" y="635" width="5" height="5"/>
    <rect x="400" y="640" width="5" height="5"/>
    <rect x="405" y="640" width="5" height="5"/>
    <rect x="410" y="640" width="5" height="5"/>
    <rect x="415" y="640" width="5" height="5"/>
    <rect x="420" y="640" width="5" height="5"/>
    <rect x="405" y="645" width="5" height="5"/>
    <rect x="410" y="645" width="5" height="5"/>
    <rect x="415" y="645" width="5" height="5"/>
    <rect x="410" y="650" width="5" height="5"/>
